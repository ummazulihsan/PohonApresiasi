<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pohon Apresiasi Digital</title>
    <style>
        :root {
            --leaf-green: #2d6a4f;
            --apple-red: #e63946;
            --sky-top: #a2d2ff;
            --sky-bottom: #caf0f8;
            --grass-green: #70e000;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 0;
            background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom));
            min-height: 100vh; overflow-x: hidden;
        }

        /* --- DEKORASI --- */
        .cloud {
            position: absolute; background: white; border-radius: 50px;
            opacity: 0.6; z-index: 0; animation: float 30s linear infinite;
        }
        .cloud:nth-child(1) { width: 100px; height: 40px; top: 10%; left: -150px; }
        .cloud:nth-child(2) { width: 150px; height: 50px; top: 25%; left: -200px; animation-delay: 10s; }
        @keyframes float { from { left: -200px; } to { left: 110vw; } }

        .grass {
            position: absolute; bottom: 0; width: 100%; height: 60px;
            background: var(--grass-green); z-index: 1;
            border-radius: 50% 50% 0 0 / 20px 20px 0 0;
        }

        /* --- LAYOUT --- */
        .page {
            display: none; min-height: 100vh; flex-direction: column;
            align-items: center; padding: 20px; box-sizing: border-box; position: relative;
        }
        .active { display: flex; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- FORM --- */
        .card {
            background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px;
            z-index: 10; margin-top: 20px; backdrop-filter: blur(10px);
        }
        h1 { color: var(--leaf-green); text-align: center; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: var(--leaf-green); }
        input, textarea {
            width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px;
            box-sizing: border-box; font-size: 14px; outline: none;
        }
        input:focus, textarea:focus { border-color: var(--leaf-green); }

        .btn {
            background: var(--leaf-green); color: white; border: none; padding: 15px;
            border-radius: 10px; width: 100%; font-size: 1rem; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }
        .btn:hover { background: #1b4332; transform: translateY(-2px); }
        .btn-secondary { background: #6c757d; margin-top: 10px; }

        /* --- TREE & APPLES --- */
        #tree-container {
            position: relative; width: 100%; max-width: 900px; height: 550px;
            z-index: 5; margin-top: 10px;
        }
        #apples-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }

        .apple-wrapper {
            position: absolute; transform: translate(-50%, -50%);
            cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .apple-wrapper:hover { transform: translate(-50%, -50%) scale(1.1); z-index: 100; }

        /* Teks di dalam Apel */
        .apple-content {
            position: absolute; width: 80%; height: 65%;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; text-align: center;
            color: white; pointer-events: none; padding: 5px;
        }
        .apple-name { font-weight: 800; font-size: 11px; text-transform: uppercase; margin-bottom: 4px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); border-bottom: 1px solid rgba(255,255,255,0.3); width: 100%; }
        
        /* Container Pesan (Scrolling) */
        .apple-messages-box {
            font-size: 8px; line-height: 1.1; font-style: italic; opacity: 0.95; 
            overflow: hidden; width: 100%; height: 40px; position: relative;
        }
        .scroll-text {
            position: absolute; width: 100%; animation: scrollUp 10s linear infinite;
        }
        @keyframes scrollUp {
            0% { top: 100%; }
            100% { top: -150%; } /* Sesuaikan berdasarkan jumlah pesan */
        }

        /* MODAL DETAIL */
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 200; justify-content: center; align-items: center;
            backdrop-filter: blur(8px);
        }
        .modal-card {
            background: white; width: 90%; max-width: 500px; padding: 30px; border-radius: 20px;
            max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .msg-bubble { background: #f0f9ff; padding: 15px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid var(--apple-red); }
        .msg-from { font-size: 12px; font-weight: bold; color: var(--leaf-green); margin-top: 5px; display: block; }
    </style>
</head>
<body>

    <div class="cloud"></div>
    <div class="cloud"></div>
    <div class="grass"></div>

    <div id="page-form" class="page active">
        <h1>🌳 Pohon Apresiasi</h1>
        <div class="card">
            <div class="input-group"><label>Nama Pengirim</label><input type="text" id="in-pengirim" placeholder="Nama Anda"></div>
            <div class="input-group"><label>Untuk Siapa?</label><input type="text" id="in-penerima" placeholder="Nama Rekan"></div>
            <div class="input-group"><label>Ucapan</label><textarea id="in-pesan" placeholder="Hal baik apa yang dilakukan?"></textarea></div>
            <button class="btn" onclick="submitApresiasi()">Kirim Kebaikan 🍎</button>
            <button class="btn btn-secondary" onclick="showPage('page-tree')">Lihat Pohon →</button>
            <div id="status" style="margin-top:10px; text-align:center;"></div>
        </div>
    </div>

    <div id="page-tree" class="page">
        <h1>🌳 Semua Kebaikan Berbuah Manis</h1>
        <div id="tree-container">
            <svg id="tree-svg" viewBox="0 0 500 500">
                <path d="M235,500 L265,500 L260,320 L240,320 Z" fill="#4e342e"/>
                <circle cx="250" cy="230" r="110" fill="#1b4332"/>
                <circle cx="170" cy="280" r="95" fill="#2d6a4f"/>
                <circle cx="330" cy="280" r="95" fill="#2d6a4f"/>
                <circle cx="250" cy="140" r="85" fill="#409167"/>
            </svg>
            <div id="apples-layer"></div>
        </div>
        <button class="btn" style="max-width:200px; z-index:20;" onclick="showPage('page-form')">← Beri Lagi</button>
    </div>

    <div id="modal" onclick="this.style.display='none'">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h2 id="modal-title" style="margin-top:0; color:var(--apple-red)"></h2>
            <div id="modal-content"></div>
            <button class="btn" onclick="document.getElementById('modal').style.display='none'">Tutup</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbz1ZA0ymK88e9c2i-bwHspwjOdShr_xnk--FHDTV9QqXVJUxefdzwr_lpEL868v-dftFQ/exec'; 
        let allData = [];

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(pageId === 'page-tree') loadTreeData();
        }

        function submitApresiasi() {
            const pgr = document.getElementById('in-pengirim').value;
            const pnr = document.getElementById('in-penerima').value;
            const psn = document.getElementById('in-pesan').value;
            if(!pgr || !pnr || !psn) return alert("Lengkapi data!");
            
            const body = new FormData();
            body.append('Pengirim', pgr); body.append('Penerima', pnr); body.append('Ucapan', psn);
            
            fetch(API_URL, { method: 'POST', body: body, mode: 'no-cors' }).then(() => {
                alert("Apresiasi terkirim!");
                showPage('page-tree');
            });
        }

        async function loadTreeData() {
            const layer = document.getElementById('apples-layer');
            layer.innerHTML = "Memuat...";
            try {
                const res = await fetch(API_URL);
                allData = await res.json();
                const groups = {};
                allData.forEach(d => {
                    const key = d.Penerima.toLowerCase().trim();
                    if(!groups[key]) groups[key] = { name: d.Penerima, messages: [] };
                    groups[key].messages.push({ text: d.Ucapan, from: d.Pengirim });
                });
                layer.innerHTML = "";
                Object.values(groups).forEach((g, i) => renderApple(g, i));
            } catch(e) { layer.innerHTML = "Gagal memuat."; }
        }

        function renderApple(group, index) {
            const layer = document.getElementById('apples-layer');
            const count = group.messages.length;
            const size = Math.min(85 + (count * 12), 160); // Ukuran membesar jika pesan banyak
            
            const wrapper = document.createElement('div');
            wrapper.className = 'apple-wrapper';
            const spots = [{x:50,y:40}, {x:32,y:58}, {x:68,y:58}, {x:50,y:22}, {x:22,y:48}, {x:78,y:48}];
            const spot = spots[index % spots.length];
            wrapper.style.left = spot.x + '%'; wrapper.style.top = spot.y + '%';
            
            // Gabungkan semua ucapan untuk teks berjalan
            const combinedText = group.messages.map(m => `• ${m.text}`).join(' | ');

            wrapper.innerHTML = `
                <svg width="${size}" height="${size}" viewBox="0 0 100 100">
                    <path d="M50,15 Q55,0 60,15" stroke="#3e2723" stroke-width="4" fill="none"/>
                    <path d="M50,90 C15,90 5,70 5,45 C5,20 25,10 50,15 C75,10 95,20 95,45 C95,70 85,90 50,90 Z" fill="var(--apple-red)"/>
                </svg>
                <div class="apple-content">
                    <div class="apple-name">${group.name}</div>
                    <div class="apple-messages-box">
                        <div class="scroll-text">${combinedText}</div>
                    </div>
                </div>
            `;
            wrapper.onclick = () => openModal(group);
            layer.appendChild(wrapper);
        }

        function openModal(group) {
            const m = document.getElementById('modal');
            document.getElementById('modal-title').innerText = `Apresiasi untuk ${group.name}`;
            const content = document.getElementById('modal-content');
            content.innerHTML = group.messages.map(msg => `
                <div class="msg-bubble">
                    <p style="margin:0">"${msg.text}"</p>
                    <span class="msg-from">Dari: ${msg.from}</span>
                </div>
            `).join('');
            m.style.display = 'flex';
        }
    </script>
</body>
</html>
