<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pohon Apresiasi Digital</title>
    <style>
        :root {
            --trink-brown: #8b4513;
            --leaf-green: #2d6a4f;
            --apple-red: #e63946;
            --sky-blue: #f0f9ff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--sky-blue);
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            margin-top: 20px;
            text-align: center;
        }

        h1 { color: var(--leaf-green); margin-bottom: 5px; }
        p.subtitle { margin-top: 0; color: #666; }

        /* Bagian Formulir Input */
        #input-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            width: 90%;
            max-width: 500px;
            text-align: left;
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: var(--leaf-green); }
        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box; /* Penting agar padding tidak merusak width */
            font-family: inherit;
        }
        textarea { resize: vertical; height: 80px; }
        input[type="text"]:focus, textarea:focus {
            border-color: var(--leaf-green);
            outline: none;
        }

        button#submitBtn {
            background-color: var(--leaf-green);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            transition: background 0.3s;
        }
        button#submitBtn:hover { background-color: #1a4331; }
        button#submitBtn:disabled { background-color: #ccc; cursor: not-allowed; }

        #status-message { text-align: center; margin-top: 10px; font-size: 14px; }

        /* Container Utama Pohon */
        #tree-area {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 600px;
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-bottom: 40px;
        }

        /* Gambar Pohon sebagai Background (menggunakan SVG inline agar tidak perlu file eksternal) */
        #tree-bg {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: auto;
            max-height: 90%;
            z-index: 1;
            opacity: 0.8;
        }

        /* Container untuk buah apel agar berada di atas pohon */
        #apples-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2; /* Di atas #tree-bg */
        }

        /* Styling Buah Apel (SVG) */
        .apple-wrapper {
            position: absolute;
            transform: translate(-50%, -50%); /* Center point */
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Animasi pop-up */
            text-align: center;
        }

        .apple-wrapper:hover {
            transform: translate(-50%, -50%) scale(1.1);
            z-index: 10;
        }

        /* Nama di dalam/bawah apel */
        .apple-label {
            position: absolute;
            top: 55%; /* Di tengah apel */
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 11px;
            font-weight: bold;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
            pointer-events: none; /* Klik tembus ke apel */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 90%;
        }

        /* Pop-up Pesan (Modal) */
        #message-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        #modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        #close-modal {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 24px;
            cursor: pointer;
            color: #aaa;
        }

        #modal-recipient { color: var(--apple-red); margin-top: 0; }
        
        .message-item {
            border-bottom: 1px solid #eee;
            padding: 10px 0;
        }
        .message-text { font-style: italic; margin-bottom: 5px; }
        .message-sender { font-size: 12px; color: #777; font-weight: bold; }

    </style>
</head>
<body>

    <header>
        <h1>🌳 Pohon Apresiasi</h1>
        <p class="subtitle">Tumbuhkan semangat dengan pujian tulus</p>
    </header>

    <section id="input-section">
        <div class="input-group">
            <label>Namamu (Pengirim)</label>
            <input type="text" id="senderInput" placeholder="Contoh: Andi">
        </div>
        <div class="input-group">
            <label>Nama Rekan Tim (Penerima)</label>
            <input type="text" id="recipientInput" placeholder="Contoh: Budi">
        </div>
        <div class="input-group">
            <label>Ucapan Apresiasi</label>
            <textarea id="messageInput" placeholder="Sebutkan hal positif yang dia lakukan..."></textarea>
        </div>
        <button id="submitBtn" onclick="sendData()">Kirim ke Pohon! 🍎</button>
        <div id="status-message"></div>
    </section>

    <section id="tree-area">
        <svg id="tree-bg" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
            <path d="M220,500 L280,500 L260,250 L240,250 Z" fill="#8b4513"/>
            <circle cx="250" cy="200" r="100" fill="#2d6a4f"/>
            <circle cx="180" cy="250" r="90" fill="#2d6a4f"/>
            <circle cx="320" cy="250" r="90" fill="#2d6a4f"/>
            <circle cx="250" cy="120" r="70" fill="#2d6a4f"/>
        </svg>

        <div id="apples-container"></div>
    </section>

    <div id="message-modal">
        <div id="modal-content">
            <span id="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="modal-recipient">Nama Penerima</h2>
            <div id="modal-messages-list">
                </div>
        </div>
    </div>

    <script>
        // --- KONFIGURASI PENTING ---
        // Ganti dengan URL dari Google Apps Script "Deploy as Web App" kamu
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwlMb2LL_Oz13Pkk1jNEh0Qk0uhqqU2WIoqsMKYOGKmIBPyEhOO1-llENndsvb79Jj1/exec'; 
        // ---------------------------

        let rawDataApresiasi = []; // Menyimpan data mentah (pengirim, penerima, pesan)
        let summaryApresiasi = {}; // Menyimpan hitungan jumlah apel per penerima

        // Templat SVG untuk satu buah apel
        const appleSvgTemplate = (size, color) => `
            <svg width="${size}" height="${size}" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <path d="M50,15 C50,5 55,5 55,15 L50,15" stroke="#6f4e37" stroke-width="5" fill="none"/>
                <path d="M52,12 C60,5 70,10 65,18 C58,22 52,15 52,12" fill="#4caf50"/>
                <path d="M50,90 C20,90 5,70 5,45 C5,20 25,10 50,15 C75,10 95,20 95,45 C95,70 80,90 50,90 Z" fill="${color}"/>
                <ellipse cx="30" cy="35" rx="8" ry="12" fill="white" opacity="0.3" transform="rotate(-30 30 35)"/>
            </svg>
        `;

        // Fungsi saat halaman dimuat
        window.onload = function() {
            if (GOOGLE_SCRIPT_URL === 'URL_APP_SCRIPT_KAMU_DI_SINI') {
                alert('PENTING: Ubah variabel GOOGLE_SCRIPT_URL di dalam kode index.html agar terhubung ke Google Sheets kamu.');
                // Menggunakan data dummy jika URL belum diset
                renderDummyData();
            } else {
                loadDataFromSheets();
            }
        };

        // Fungsi mengambil data dari Google Sheets (GET)
        async function loadDataFromSheets() {
            const container = document.getElementById('apples-container');
            container.innerHTML = '<div style="text-align:center; padding-top:100px; color:#666;">Memuat pohon...</div>';
            
            try {
                const response = await fetch(GOOGLE_SCRIPT_URL);
                if (!response.ok) throw new Error('Gagal mengambil data');
                
                rawDataApresiasi = await response.json();
                processAndRenderData();

            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = '<div style="text-align:center; padding-top:100px; color:red;">Gagal memuat data pohon. Pastikan URL Script benar dan akses set ke "Anyone".</div>';
            }
        }

        // Fungsi mengirim data ke Google Sheets (POST via no-cors)
        function sendData() {
            const sender = document.getElementById('senderInput').value.trim();
            const recipient = document.getElementById('recipientInput').value.trim();
            const message = document.getElementById('messageInput').value.trim();
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('status-message');

            if (!sender || !recipient || !message) {
                alert('Mohon isi semua bidang (Pengirim, Penerima, dan Ucapan).');
                return;
            }

            if (GOOGLE_SCRIPT_URL === 'URL_APP_SCRIPT_KAMU_DI_SINI') {
                alert('Tidak bisa mengirim. URL Google Script belum diset.');
                return;
            }

            btn.disabled = true;
            btn.innerText = 'Mengirim...';
            status.innerText = 'Menghubungkan ke Sheets...';
            status.style.color = '#666';

            // Menggunakan metode form submission lawas karena Google Apps Script POST sering bermasalah dengan CORS di fetch
            const formData = new FormData();
            formData.append('Pengirim', sender);
            formData.append('Penerima', recipient);
            formData.append('Ucapan', message);

            // Trik menggunakan mode: 'no-cors' agar bisa POST ke Google Script
            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                body: formData,
                mode: 'no-cors' 
            })
            .then(() => {
                // Karena no-cors, kita tidak bisa baca response, tapi asumsi sukses jika tidak error
                status.innerText = `Terima kasih! Apresiasi untuk ${recipient} telah dikirim. Refresh halaman untuk melihat hasilnya.`;
                status.style.color = 'green';
                
                // Reset form
                document.getElementById('senderInput').value = '';
                document.getElementById('recipientInput').value = '';
                document.getElementById('messageInput').value = '';
            })
            .catch(error => {
                console.error('Error:', error);
                status.innerText = 'Gagal mengirim data. Coba lagi nanti.';
                status.style.color = 'red';
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerText = 'Kirim ke Pohon! 🍎';
            });
        }

        // Memproses data mentah menjadi hitungan dan merender apel
        function processAndRenderData() {
            summaryApresiasi = {};
            
            // Hitung berapa banyak apresiasi per PENERIMA
            rawDataApresiasi.forEach(item => {
                if (item.Penerima) { // Pastikan field Penerima ada
                    const nama = item.Penerima.trim();
                    summaryApresiasi[nama] = (summaryApresiasi[nama] || 0) + 1;
                }
            });

            renderApples();
        }

        // Merender buah apel ke pohon berdasarkan summary
        function renderApples() {
            const container = document.getElementById('apples-container');
            container.innerHTML = ''; // Bersihkan container

            const reciepientNames = Object.keys(summaryApresiasi);
            if (reciepientNames.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding-top:100px; color:#666;">Belum ada apresiasi. Ayo jadi yang pertama mengirim!</div>';
                return;
            }

            reciepientNames.forEach((name, index) => {
                const count = summaryApresiasi[name];
                
                // --- LOGIKA UKURAN ---
                // Ukuran dasar 50px, bertambah 15px setiap dapat apresiasi, maksimal 120px
                const size = Math.min(50 + (count * 15), 120); 

                const wrapper = document.createElement('div');
                wrapper.className = 'apple-wrapper';
                
                // --- LOGIKA POSISI ---
                // Menggunakan koordinat absolut agar apel menyebar di area daun pohon (sekitar y: 10% - 60%, x: 15% - 85%)
                // Menggunakan seed 'index' agar posisi acak tapi konsisten saat refresh
                const pos = getDeterministicRandomPosition(index, size);
                wrapper.style.left = pos.x + '%';
                wrapper.style.top = pos.y + '%';
                
                // Masukkan SVG Apel
                wrapper.innerHTML = appleSvgTemplate(size, '#e63946'); // Warna merah
                
                // Masukkan Label Nama
                const label = document.createElement('div');
                label.className = 'apple-label';
                label.innerText = name;
                // Sesuaikan ukuran font label dengan ukuran apel
                label.style.fontSize = Math.max(9, size / 7) + 'px';
                wrapper.appendChild(label);

                // Set tooltip
                wrapper.title = `${name} menerima ${count} apresiasi. Klik untuk membaca.`;
                
                // Event Klik untuk buka modal
                wrapper.onclick = () => openModal(name);

                container.appendChild(wrapper);
            });
        }

        // Fungsi pembantu agar posisi "acak" tapi tidak berubah-ubah saat refresh
        function getDeterministicRandomPosition(index, size) {
            // Seeded random buatan sederhana
            const xSeed = Math.sin(index + 1) * 10000;
            const ySeed = Math.cos(index + 1) * 10000;
            
            // Jaga agar tidak terlalu di pinggir area dahan
            const x = 15 + (Math.abs(xSeed) % 70); // 15% - 85%
            const y = 15 + (Math.abs(ySeed) % 50); // 15% - 65% (area dahan)
            
            return { x, y };
        }

        // --- LOGIKA MODAL (POP-UP) ---
        function openModal(recipientName) {
            const modal = document.getElementById('message-modal');
            const title = document.getElementById('modal-recipient');
            const list = document.getElementById('modal-messages-list');
            
            title.innerText = `Apresiasi untuk ${recipientName}`;
            list.innerHTML = ''; // Bersihkan list lawas

            // Filter data mentah untuk mengambil pesan milik penerima ini
            const messages = rawDataApresiasi.filter(item => item.Penerima && item.Penerima.trim() === recipientName);

            messages.forEach(msg => {
                const item = document.createElement('div');
                item.className = 'message-item';
                
                const text = document.createElement('p');
                text.className = 'message-text';
                text.innerText = `"${msg.Ucapan}"`;
                
                const sender = document.createElement('p');
                sender.className = 'message-sender';
                sender.innerText = `— Dari: ${msg.Pengirim || 'Anonim'}`;
                
                item.appendChild(text);
                item.appendChild(sender);
                list.appendChild(item);
            });

            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('message-modal').style.display = 'none';
        }

        // Klik di luar kotak modal untuk menutup
        window.onclick = function(event) {
            const modal = document.getElementById('message-modal');
            if (event.target == modal) {
                closeModal();
            }
        }

        // Fungsi sementara jika user belum setting URL Google
        function renderDummyData() {
            console.log("Menggunakan data dummy.");
            rawDataApresiasi = [
                { Pengirim: 'Siti', Penerima: 'Andi', Ucapan: 'Terima kasih Andi sudah bantu resolve bug urgent kemarin!' },
                { Pengirim: 'Reno', Penerima: 'Budi', Ucapan: 'Presentasi klien tadi keren banget Bud!' },
                { Pengirim: 'Dewi', Penerima: 'Andi', Ucapan: 'Andi selalu support kalau diajak diskusi teknik.' },
                { Pengirim: 'Budi', Penerima: 'Siti', Ucapan: 'Siti jago banget dokumentasinya, rapi!' },
                { Pengirim: 'Manager', Penerima: 'Andi', Ucapan: 'Kerja bagus bulan ini Andi.' }
            ];
            processAndRenderData();
            document.getElementById('status-message').innerText = '(Mode Demo: Menampilkan data contoh)';
        }
    </script>
</body>
</html>
