<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pohon Apresiasi Digital</title>
    <style>
        :root {
            --leaf-green: #2d6a4f;
            --apple-red: #e63946;
            --sky-top: #a2d2ff;
            --sky-bottom: #caf0f8;
            --grass-green: #70e000;
            --trunk-brown: #5d4037;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 0;
            background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom));
            min-height: 100vh; overflow-x: hidden;
        }

        /* --- DEKORASI --- */
        .cloud {
            position: absolute; background: white; border-radius: 50px;
            opacity: 0.6; z-index: 0; animation: float 30s linear infinite;
        }
        .cloud:nth-child(1) { width: 100px; height: 40px; top: 10%; left: -150px; }
        .cloud:nth-child(2) { width: 150px; height: 50px; top: 25%; left: -200px; animation-delay: 10s; }
        @keyframes float { from { left: -200px; } to { left: 110vw; } }

        .grass {
            position: absolute; bottom: 0; width: 100%; height: 60px;
            background: var(--grass-green); z-index: 1;
            border-radius: 50% 50% 0 0 / 20px 20px 0 0;
        }

        /* --- LAYOUT --- */
        .page {
            display: none; min-height: 100vh; flex-direction: column;
            align-items: center; padding: 20px; box-sizing: border-box; position: relative;
        }
        .active { display: flex; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- FORM --- */
        .card {
            background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px;
            z-index: 10; margin-top: 20px; backdrop-filter: blur(10px);
        }
        h1 { color: var(--leaf-green); text-align: center; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: var(--leaf-green); }
        input, textarea {
            width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px;
            box-sizing: border-box; font-size: 14px; outline: none;
        }
        input:focus, textarea:focus { border-color: var(--leaf-green); }

        .btn {
            background: var(--leaf-green); color: white; border: none; padding: 15px;
            border-radius: 10px; width: 100%; font-size: 1rem; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }
        .btn:hover { background: #1b4332; transform: translateY(-2px); }
        .btn-secondary { background: #6c757d; margin-top: 10px; }

        /* --- TREE & APPLES --- */
        #tree-container {
            position: relative; width: 100%; max-width: 900px; height: 550px;
            z-index: 5; margin-top: 10px;
        }
        #apples-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }

        .apple-wrapper {
            position: absolute; transform: translate(-50%, -50%);
            cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .apple-wrapper:hover { transform: translate(-50%, -50%) scale(1.15); z-index: 50; }

        /* Teks di dalam Apel */
        .apple-content {
            position: absolute; width: 85%; height: 70%;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; text-align: center;
            color: white; pointer-events: none; padding: 5px;
        }
        .apple-name { font-weight: 800; text-transform: uppercase; margin-bottom: 2px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        .apple-msg { font-size: 9px; line-height: 1; font-style: italic; opacity: 0.95; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }

    </style>
</head>
<body>

    <div class="cloud"></div>
    <div class="cloud"></div>
    <div class="grass"></div>

    <div id="page-form" class="page active">
        <h1>🌳 Beri Apresiasi</h1>
        <div class="card">
            <div class="input-group">
                <label>Nama Pengirim</label>
                <input type="text" id="in-pengirim" placeholder="Siapa namamu?">
            </div>
            <div class="input-group">
                <label>Untuk Siapa?</label>
                <input type="text" id="in-penerima" placeholder="Nama rekan kerja">
            </div>
            <div class="input-group">
                <label>Ucapan Apresiasi</label>
                <textarea id="in-pesan" placeholder="Tuliskan hal keren yang dia lakukan..."></textarea>
            </div>
            <button class="btn" onclick="submitApresiasi()">Gantungkan di Pohon 🍎</button>
            <button class="btn btn-secondary" onclick="showPage('page-tree')">Lihat Pohon →</button>
            <div id="status" style="margin-top:10px; text-align:center; font-weight:bold;"></div>
        </div>
    </div>

    <div id="page-tree" class="page">
        <h1>🌳 Pohon Kebaikan</h1>
        <div id="tree-container">
            <svg id="tree-svg" viewBox="0 0 500 500">
                <path d="M235,500 L265,500 L260,320 L240,320 Z" fill="#4e342e"/>
                <circle cx="250" cy="230" r="110" fill="#1b4332"/>
                <circle cx="170" cy="280" r="95" fill="#2d6a4f"/>
                <circle cx="330" cy="280" r="95" fill="#2d6a4f"/>
                <circle cx="250" cy="140" r="85" fill="#409167"/>
            </svg>
            <div id="apples-layer"></div>
        </div>
        <button class="btn" style="max-width:200px; z-index:20;" onclick="showPage('page-form')">← Beri Lagi</button>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbz1ZA0ymK88e9c2i-bwHspwjOdShr_xnk--FHDTV9QqXVJUxefdzwr_lpEL868v-dftFQ/exec'; // Ganti dengan URL Script Anda
        let allData = [];

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(pageId === 'page-tree') loadTreeData();
        }

        function submitApresiasi() {
            const pgr = document.getElementById('in-pengirim').value.trim();
            const pnr = document.getElementById('in-penerima').value.trim();
            const psn = document.getElementById('in-pesan').value.trim();
            const stat = document.getElementById('status');

            if(!pgr || !pnr || !psn) return alert("Isi semua dulu ya!");

            stat.innerText = "Mengirim...";
            const body = new FormData();
            body.append('Pengirim', pgr);
            body.append('Penerima', pnr);
            body.append('Ucapan', psn);

            fetch(API_URL, { method: 'POST', body: body, mode: 'no-cors' })
                .then(() => {
                    stat.innerText = "Terkirim! 🍎";
                    setTimeout(() => {
                        document.getElementById('in-pengirim').value = '';
                        document.getElementById('in-penerima').value = '';
                        document.getElementById('in-pesan').value = '';
                        showPage('page-tree');
                    }, 1000);
                });
        }

        async function loadTreeData() {
            const layer = document.getElementById('apples-layer');
            layer.innerHTML = "<p style='text-align:center; padding-top:100px;'>Menyiapkan buah...</p>";

            try {
                const res = await fetch(API_URL);
                allData = await res.json();
                
                // Grouping Data (Case Insensitive)
                const groups = {};
                allData.forEach(d => {
                    const key = d.Penerima.toLowerCase().trim();
                    if(!groups[key]) groups[key] = { name: d.Penerima, messages: [] };
                    groups[key].messages.push({ text: d.Ucapan, from: d.Pengirim });
                });

                layer.innerHTML = "";
                Object.values(groups).forEach((group, i) => {
                    renderApple(group, i);
                });
            } catch(e) { layer.innerHTML = "Gagal memuat."; }
        }

        function renderApple(group, index) {
            const layer = document.getElementById('apples-layer');
            const count = group.messages.length;
            // Ukuran buah lebih besar sedikit agar teks muat (70px - 140px)
            const size = Math.min(75 + (count * 15), 140);
            
            const wrapper = document.createElement('div');
            wrapper.className = 'apple-wrapper';
            
            const spots = [{x:50,y:40}, {x:32,y:58}, {x:68,y:58}, {x:50,y:22}, {x:22,y:48}, {x:78,y:48}, {x:40,y:30}, {x:60,y:30}];
            const spot = spots[index % spots.length];
            wrapper.style.left = (spot.x + (Math.sin(index)*10)) + '%';
            wrapper.style.top = (spot.y + (Math.cos(index)*10)) + '%';
            
            // Ambil ucapan terakhir untuk ditampilkan di pohon
            const lastMsg = group.messages[group.messages.length - 1].text;

            wrapper.innerHTML = `
                <svg width="${size}" height="${size}" viewBox="0 0 100 100">
                    <path d="M50,15 Q55,0 60,15" stroke="#3e2723" stroke-width="4" fill="none"/>
                    <path d="M50,90 C15,90 5,70 5,45 C5,20 25,10 50,15 C75,10 95,20 95,45 C95,70 85,90 50,90 Z" fill="var(--apple-red)"/>
                    <path d="M52,15 Q70,5 65,20 Q60,25 52,15" fill="#70e000"/>
                </svg>
                <div class="apple-content" style="font-size: ${size/9}px">
                    <div class="apple-name">${group.name}</div>
                    <div class="apple-msg">"${lastMsg}"</div>
                </div>
            `;

            layer.appendChild(wrapper);
        }
    </script>
</body>
</html>
