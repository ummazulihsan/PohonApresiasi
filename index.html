<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pohon Apresiasi Pegawai</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f9ff; }
        #tree-container { 
            position: relative; 
            width: 600px; height: 500px; 
            margin: 20px auto; 
            background: url('https://cdn-icons-png.flaticon.com/512/489/489969.png') no-repeat center bottom;
            background-size: contain;
            border-bottom: 5px solid #8b4513;
        }
        .fruit {
            position: absolute;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 10px;
            font-weight: bold;
            transition: all 0.5s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            cursor: pointer;
        }
    </style>
</head>
<body>

  
    <h2>🌳 Pohon Apresiasi Pegawai</h2>
    
    <input type="text" id="nameInput" placeholder="Nama Pegawai">
    <button onclick="addAppreciation()">Kirim Apresiasi!</button>

    <div id="tree-container"></div>

    <script>
        const dataApresiasi = {};
        const colors = ['#ff4d4d', '#ffcc00', '#ff8c00', '#e63946', '#f1a7a1'];

        function addAppreciation() {
            const name = document.getElementById('nameInput').value.trim();
            if (!name) return;

            // Update hitungan
            dataApresiasi[name] = (dataApresiasi[name] || 0) + 1;
            renderTree();
            document.getElementById('nameInput').value = '';
        }

        function renderTree() {
            const container = document.getElementById('tree-container');
            container.innerHTML = '';

            Object.keys(dataApresiasi).forEach((name, index) => {
                const count = dataApresiasi[name];
                const fruit = document.createElement('div');
                fruit.className = 'fruit';
                
                // Logika Ukuran: Semakin banyak apresiasi, semakin besar
                const size = 40 + (count * 10); 
                
                fruit.style.width = `${size}px`;
                fruit.style.height = `${size}px`;
                fruit.style.backgroundColor = colors[index % colors.length];
                
                // Posisi acak di dahan pohon
                fruit.style.left = `${20 + (index * 70) % 400}px`;
                fruit.style.top = `${50 + (index * 40) % 200}px`;
                
                fruit.innerText = name;
                fruit.title = `${count} Apresiasi`;
                
                container.appendChild(fruit);
            });
        }

      async function loadData() {
    const response = await fetch('https://script.google.com/macros/s/AKfycbxAhN06gHEFRbCrm5QwK9CWEnBw1tJuGAXlk7I5ms-x9tfywFW0IrIRfQcfl_vh7XmUIA/exec');
    const data = await response.json();
    
    // Logika untuk menghitung jumlah nama yang sama
    const counts = {};
    data.forEach(item => {
        counts[item.name] = (counts[item.name] || 0) + 1;
    });
    
    renderTree(counts); // Jalankan fungsi gambar pohon
}
    </script>
</body>
</html>
