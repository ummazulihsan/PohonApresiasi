<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pohon Apresiasi Digital</title>
    <style>
        :root {
            --leaf-green: #2d6a4f;
            --apple-red: #e63946;
            --sky-blue: #f0f9ff;
            --trunk-brown: #5d4037;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--sky-blue);
            color: #333;
            overflow-x: hidden;
        }

        /* Navigasi Halaman */
        .page {
            display: none; /* Sembunyikan semua halaman di awal */
            min-height: 100vh;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .active { display: flex; animation: fadeIn 0.5s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- STYLING HALAMAN 1 (FORM) --- */
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            margin-top: 40px;
        }

        h1 { color: var(--leaf-green); text-align: center; margin-bottom: 10px; }
        .quote-box {
            text-align: center;
            font-style: italic;
            color: #555;
            margin-bottom: 25px;
            line-height: 1.6;
            font-size: 0.95rem;
            border-left: 4px solid var(--leaf-green);
            padding-left: 15px;
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: var(--leaf-green); }
        input, textarea {
            width: 100%; padding: 12px;
            border: 2px solid #eee; border-radius: 8px;
            box-sizing: border-box; font-size: 1rem;
        }
        input:focus, textarea:focus { border-color: var(--leaf-green); outline: none; }

        .btn {
            background: var(--leaf-green); color: white;
            border: none; padding: 15px; border-radius: 8px;
            width: 100%; font-size: 1rem; font-weight: bold;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn:hover { background: #1b4332; transform: translateY(-2px); }
        .btn-secondary { background: #777; margin-top: 20px; }

        /* --- STYLING HALAMAN 2 (POHON) --- */
        #tree-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 550px;
            margin-top: 20px;
        }

        #tree-svg { width: 100%; height: 100%; }

        .apple-wrapper {
            position: absolute;
            transform: translate(-50%, -50%);
            cursor: pointer;
            z-index: 10;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .apple-wrapper:hover { transform: translate(-50%, -50%) scale(1.2); }
        .apple-label {
            position: absolute; top: 55%; left: 50%;
            transform: translate(-50%, -50%);
            color: white; font-weight: bold; font-size: 10px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
            pointer-events: none; text-align: center; width: 100%;
        }

        /* Popup Modal */
        #modal {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 100;
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 25px; border-radius: 15px;
            max-width: 400px; width: 90%; max-height: 70vh; overflow-y: auto;
        }
        .msg-card { border-bottom: 1px solid #eee; padding: 10px 0; }
        .msg-card:last-child { border: none; }
        .msg-sender { font-size: 0.8rem; color: #888; font-weight: bold; }
    </style>
</head>
<body>

    <div id="page-form" class="page active">
        <h1>🍎 Beri Apresiasi</h1>
        <div class="card">
            <div class="quote-box">
                "Kebaikan yang terus bertumbuh akan selalu menemukan jalannya. Lakukan kebaikan apa saja, walaupun kecil, suatu saat akan berbuah manis bagi sesama."
            </div>
            
            <div class="input-group">
                <label>Nama Pengirim</label>
                <input type="text" id="in-pengirim" placeholder="Nama Anda">
            </div>
            <div class="input-group">
                <label>Penerima Apresiasi</label>
                <input type="text" id="in-penerima" placeholder="Nama Rekan Kerja">
            </div>
            <div class="input-group">
                <label>Pesan Singkat</label>
                <textarea id="in-pesan" placeholder="Tuliskan apresiasi tulusmu..."></textarea>
            </div>
            <button class="btn" onclick="submitApresiasi()">Kirim Kebaikan 🍎</button>
            <button class="btn btn-secondary" onclick="showPage('page-tree')">Lihat Pohon Apresiasi →</button>
            <div id="status" style="margin-top:10px; text-align:center; font-size:14px;"></div>
        </div>
    </div>

    <div id="page-tree" class="page">
        <h1>🌳 Pohon Kebaikan</h1>
        <p style="color:#666; margin-top:0;">Klik pada buah untuk melihat pesan apresiasi</p>
        
        <div id="tree-container">
            <svg id="tree-svg" viewBox="0 0 500 500">
                <path d="M230,500 L270,500 L260,300 L240,300 Z" fill="#5d4037"/>
                <circle cx="250" cy="220" r="110" fill="#2d6a4f"/>
                <circle cx="170" cy="280" r="95" fill="#2d6a4f"/>
                <circle cx="330" cy="280" r="95" fill="#2d6a4f"/>
                <circle cx="250" cy="140" r="80" fill="#1b4332"/>
            </svg>
            <div id="apples-layer"></div>
        </div>

        <button class="btn" style="max-width:200px;" onclick="showPage('page-form')">← Beri Apresiasi Lagi</button>
    </div>

    <div id="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="modal-name" style="color:var(--apple-red); margin-top:0;"></h2>
            <div id="modal-list"></div>
            <button class="btn" style="margin-top:20px" onclick="document.getElementById('modal').style.display='none'">Tutup</button>
        </div>
    </div>

    <script>
        // === GANTI URL INI DENGAN URL GOOGLE APPS SCRIPT ANDA ===
        const API_URL = 'https://script.google.com/macros/s/AKfycbz1ZA0ymK88e9c2i-bwHspwjOdShr_xnk--FHDTV9QqXVJUxefdzwr_lpEL868v-dftFQ/exec';

        let allData = [];

        // Navigasi antar halaman
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(pageId === 'page-tree') loadTreeData();
        }

        // Kirim Data
        function submitApresiasi() {
            const pgr = document.getElementById('in-pengirim').value;
            const pnr = document.getElementById('in-penerima').value;
            const psn = document.getElementById('in-pesan').value;
            const stat = document.getElementById('status');

            if(!pgr || !pnr || !psn) return alert("Mohon lengkapi semua data!");

            stat.innerText = "Mengirim...";
            
            const body = new FormData();
            body.append('Pengirim', pgr);
            body.append('Penerima', pnr);
            body.append('Ucapan', psn);

            fetch(API_URL, { method: 'POST', body: body, mode: 'no-cors' })
                .then(() => {
                    stat.style.color = "green";
                    stat.innerText = "Berhasil dikirim! Membuka pohon...";
                    setTimeout(() => {
                        document.getElementById('in-pengirim').value = '';
                        document.getElementById('in-penerima').value = '';
                        document.getElementById('in-pesan').value = '';
                        showPage('page-tree');
                    }, 1500);
                })
                .catch(() => {
                    stat.style.color = "red";
                    stat.innerText = "Gagal mengirim. Cek koneksi.";
                });
        }

        // Ambil Data & Render Pohon
        async function loadTreeData() {
            const layer = document.getElementById('apples-layer');
            layer.innerHTML = "Memuat buah...";

            try {
                const res = await fetch(API_URL);
                allData = await res.json();
                
                // Hitung jumlah apresiasi per nama
                const summary = {};
                allData.forEach(d => {
                    if(d.Penerima) summary[d.Penerima] = (summary[d.Penerima] || 0) + 1;
                });

                layer.innerHTML = "";
                Object.keys(summary).forEach((nama, i) => {
                    renderApple(nama, summary[nama], i);
                });
            } catch(e) {
                layer.innerHTML = "Gagal memuat pohon.";
            }
        }

        function renderApple(name, count, index) {
            const layer = document.getElementById('apples-layer');
            const size = Math.min(45 + (count * 12), 110);
            
            const wrapper = document.createElement('div');
            wrapper.className = 'apple-wrapper';
            
            // ALGORITMA PENEMPATAN NATURAL (Hanya di rimbun daun)
            // Area Daun Utama (Dalam % terhadap container)
            // Kita gunakan beberapa koordinat pusat daun agar lebih natural
            const centers = [
                {x: 50, y: 44}, {x: 34, y: 56}, {x: 66, y: 56}, {x: 50, y: 28}
            ];
            const base = centers[index % centers.length];
            const offsetX = (Math.sin(index * 1.5) * 15); // Variasi posisi
            const offsetY = (Math.cos(index * 1.5) * 15);
            
            wrapper.style.left = (base.x + offsetX) + '%';
            wrapper.style.top = (base.y + offsetY) + '%';
            
            wrapper.innerHTML = `
                <svg width="${size}" height="${size}" viewBox="0 0 100 100">
                    <path d="M50,15 C50,5 55,5 55,15" stroke="#4a3000" stroke-width="4" fill="none"/>
                    <path d="M50,90 C15,90 5,70 5,45 C5,20 25,10 50,15 C75,10 95,20 95,45 C95,70 85,90 50,90 Z" fill="#e63946"/>
                    <circle cx="35" cy="35" r="8" fill="white" opacity="0.2"/>
                </svg>
                <div class="apple-label" style="font-size: ${Math.max(8, size/8)}px">${name}</div>
            `;

            wrapper.onclick = () => showDetail(name);
            layer.appendChild(wrapper);
        }

        function showDetail(name) {
            const modal = document.getElementById('modal');
            const list = document.getElementById('modal-list');
            document.getElementById('modal-name').innerText = name;
            
            list.innerHTML = "";
            allData.filter(d => d.Penerima === name).forEach(m => {
                const div = document.createElement('div');
                div.className = 'msg-card';
                div.innerHTML = `<p style="margin:0 0 5px 0">"${m.Ucapan}"</p>
                                 <p class="msg-sender">Dari: ${m.Pengirim}</p>`;
                list.appendChild(div);
            });
            modal.style.display = 'flex';
        }
    </script>
</body>
</html>
